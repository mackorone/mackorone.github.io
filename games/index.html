<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
        }

        .subtitle {
            text-align: center;
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .folders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .folder {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            padding: 20px;
            border: 2px solid rgba(255, 255, 255, 0.15);
        }

        .folder-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .games-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 10px 14px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .game-card:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .game-icon {
            font-size: 28px;
            flex-shrink: 0;
        }

        .game-title {
            font-size: 16px;
            font-weight: bold;
        }

        .empty-folder {
            font-size: 14px;
            opacity: 0.5;
            font-style: italic;
            padding: 8px 0;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 36px;
            }

            .folders-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Games</h1>
        <p class="subtitle">Choose a game to play</p>

        <div class="folders-grid">
            <div class="folder">
                <div class="folder-title">Rory's Games</div>
                <div class="games-list">
                    <div class="empty-folder">No games yet</div>
                </div>
            </div>

            <div class="folder">
                <div class="folder-title">Shea's Games</div>
                <div class="games-list">
                    <div class="empty-folder">No games yet</div>
                </div>
            </div>

            <div class="folder">
                <div class="folder-title">Maggie's Games</div>
                <div class="games-list">
                    <a href="birthday-bubble-pop.html"
                       class="game-card">
                        <div class="game-icon">🫧</div>
                        <div class="game-title">
                            Birthday Bubble Pop
                        </div>
                    </a>
                </div>
            </div>

            <div class="folder">
                <div class="folder-title">Uncle Mack's Games</div>
                <div class="games-list">
                    <a href="tower-topple.html"
                       class="game-card">
                        <div class="game-icon">📦</div>
                        <div class="game-title">
                            Tower Topple
                        </div>
                    </a>
                    <a href="tic-tac-toe.html"
                       class="game-card">
                        <div class="game-icon">⭕</div>
                        <div class="game-title">
                            Tic-Tac-Toe
                        </div>
                    </a>
                    <a href="neon-echo.html"
                       class="game-card">
                        <div class="game-icon">🔮</div>
                        <div class="game-title">
                            Neon Echo
                        </div>
                    </a>
                    <a href="gravity-flip.html"
                       class="game-card">
                        <div class="game-icon">💎</div>
                        <div class="game-title">
                            Gravity Flip
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
